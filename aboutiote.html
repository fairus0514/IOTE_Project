<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Engineering | KMITL</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* จัด Layout หลักให้อยู่ตรงกลางและดัน Footer ลงไปล่างสุด */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .hero-title {
            font-size: 3rem; color: var(--secondary-color); margin-bottom: 10px;
        }
        .flex-container {
            display: flex; gap: 20px; justify-content: space-between; margin-top: 40px;
        }
        /* Mobile Responsive สำหรับหน้า Index */
        @media (max-width: 768px) {
            .hero-title { font-size: 2rem; }
            .flex-container { flex-direction: column; }
            .flex-container > div { width: 100% !important; }
            .mobile-menu-btn { display: block !important; }
            #nav-menu { display: none; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
        <div class="main-container">
  <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
  <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>

  <div class="slider" id="imageSlider">
    <div class="slide"><img src="images/aj1.png" alt="1"></div>
    <div class="slide"><img src="https://picsum.photos/id/102/600/400" alt="2"></div>
    <div class="slide"><img src="https://picsum.photos/id/103/600/400" alt="3"></div>
    <div class="slide"><img src="https://picsum.photos/id/104/600/400" alt="4"></div>
  </div>
</div>
   <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>
</body>
</html>
