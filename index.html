<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Engineering | KMITL</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* จัด Layout หลักให้อยู่ตรงกลางและดัน Footer ลงไปล่างสุด */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .hero-title {
            font-size: 3rem; color: var(--secondary-color); margin-bottom: 10px;
        }
        .flex-container {
            display: flex; gap: 20px; justify-content: space-between; margin-top: 40px;
        }
        /* Mobile Responsive สำหรับหน้า Index */
        @media (max-width: 768px) {
            .hero-title { font-size: 2rem; }
            .flex-container { flex-direction: column; }
            .flex-container > div { width: 100% !important; }
            .mobile-menu-btn { display: block !important; }
            #nav-menu { display: none; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <section style="text-align: center; background-color: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <h1 class="hero-title">Welcome to IoT Engineering</h1>
            <p style="font-size: 1.2rem; color: #7F8C8D; margin-bottom: 30px;">Innovating the future with Internet of Things.</p>
            
            <a href="admissions.html" class="btn">Apply Now</a>
            <a href="about.html" class="btn" style="background-color: #95A5A6; margin-left: 10px;">Learn More</a>

            <div style="margin-top: 40px;">
                <iframe width="100%" height="400" style="max-width: 800px; border-radius: 12px; border: none; background-color: var(--bg-color);" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </section>

        <section class="flex-container">
            <div class="card" style="width: 48%; text-align: center;">
                <h3 style="color: var(--primary-color); margin-bottom: 15px;">Academic Excellence</h3>
                <p style="margin-bottom: 15px;">Explore our modern curriculum designed for the future.</p>
                <a href="academic.html" style="color: var(--primary-color); font-weight: bold; text-decoration: none;">Read more →</a>
            </div>
            
            <div class="card" style="width: 48%; text-align: center;">
                <h3 style="color: var(--primary-color); margin-bottom: 15px;">Cyber Lab Performance</h3>
                <p style="margin-bottom: 15px;">Experience hands-on learning in our advanced facilities.</p>
                <a href="performance.html" style="color: var(--primary-color); font-weight: bold; text-decoration: none;">Explore Lab →</a>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/app.js"></script>

</body>
</html>
