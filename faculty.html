<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty | IoT Engineering</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* จัด Layout แบบ Grid ให้สวยงาม */
        .faculty-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .faculty-img {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <h1 style="text-align: center; margin-top: 40px; color: var(--secondary-color);">คณาจารย์ภาควิชา IoT Engineering</h1>

    <div id="faculty-container" class="faculty-grid">
        <p style="text-align: center;">กำลังโหลดข้อมูล...</p>
    </div>

    <script>
        // ฟังก์ชันไปดูดข้อมูลจาก API (หลังบ้าน)
        async function loadFaculty() {
            try {
                const response = await fetch('api/get_faculty.php');
                const result = await response.json();

                const container = document.getElementById('faculty-container');
                container.innerHTML = ''; // ล้างข้อความ "กำลังโหลดข้อมูล"

                if (result.status === 'success') {
                    // เอาข้อมูลที่ได้มาวนลูปสร้างการ์ด HTML
                    result.data.forEach(ajarn => {
                        const card = `
                            <div class="card" style="text-align: center;">
                                <img src="${ajarn.image_path}" class="faculty-img" onerror="this.src='https://via.placeholder.com/100'">
                                <h3 style="color: var(--primary-color);">${ajarn.fullname}</h3>
                                <p>${ajarn.position}</p>
                                <p style="font-size: 0.8em; color: gray;">สาขา: ${ajarn.department}</p>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                }
            } catch (error) {
                console.error("เกิดข้อผิดพลาด: ", error);
            }
        }

        // สั่งให้โหลดข้อมูลทันทีที่เปิดหน้าเว็บ
        loadFaculty();
    </script>
    
<div id="footer-placeholder"></div>
<script src="js/app.js"></script>
</body>
</html>
