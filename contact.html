<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | IoT Engineering</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* สไตล์ฟอร์มแบบ Flat UI */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary-color);
            font-weight: bold;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ECF0F1;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 1rem;
            transition: border-color 0.3s;
            background-color: #F8F9F9;
        }
        /* IxD: เปลี่ยนสีขอบเวลากดพิมพ์ข้อความ */
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #FFFFFF;
        }
        /* กล่องแจ้งเตือนผลลัพธ์ */
        #response-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none; /* ซ่อนไว้ก่อน */
            font-weight: bold;
        }
        .success-msg { background-color: #D4EDDA; color: #155724; border: 1px solid #C3E6CB; }
        .error-msg { background-color: #F8D7DA; color: #721C24; border: 1px solid #F5C6CB; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="section" style="max-width: 600px; margin: 0 auto; text-align: center;">
        <h1 class="section-title">Contact Us</h1>
        <p style="color: #7F8C8D; margin-bottom: 30px;">มีข้อสงสัยเกี่ยวกับภาควิชา? ส่งข้อความหาเราได้เลย</p>

        <div class="card">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">ชื่อ-นามสกุล</label>
                    <input type="text" id="name" class="form-control" placeholder="กรอกชื่อของคุณ" required>
                </div>
                
                <div class="form-group">
                    <label for="email">อีเมลติดต่อกลับ</label>
                    <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="message">ข้อความ</label>
                    <textarea id="message" class="form-control" rows="5" placeholder="พิมพ์ข้อความของคุณที่นี่..." required></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem;">ส่งข้อความ</button>
            </form>

            <div id="response-message"></div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // บังคับไม่ให้เว็บรีเฟรชหน้าใหม่
            
            // ดึงค่าจากกล่องข้อความ
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const responseDiv = document.getElementById('response-message');

            try {
                // ส่งข้อมูลไปที่ API แบบรันอยู่หลังบ้าน
                const response = await fetch('api/submit_contact.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: name, email: email, message: message }) // แปลงข้อมูลเป็น JSON
                });

                const result = await response.json();

                // แสดงผลลัพธ์บนหน้าเว็บ (IxD: ให้ Feedback ผู้ใช้ทันที)
                responseDiv.style.display = 'block';
                if (result.status === 'success') {
                    responseDiv.className = 'success-msg';
                    responseDiv.innerHTML = '✅ ' + result.message;
                    this.reset(); // ล้างฟอร์มให้ว่างหลังจากส่งเสร็จ
                } else {
                    responseDiv.className = 'error-msg';
                    responseDiv.innerHTML = '❌ ' + result.message;
                }
            } catch (error) {
                console.error('Error:', error);
                responseDiv.style.display = 'block';
                responseDiv.className = 'error-msg';
                responseDiv.innerHTML = '❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้';
            }
        });
    </script>
</body>
</html>
